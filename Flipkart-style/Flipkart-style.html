<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Review Style</title>
</head>
<body align="center">
    
    <h2>Flipkart Review</h2>
    <form action="#" method="post">
        <label for="Username">Username :</label>
        <input type="text" id="Username" placeholder="Enter your Username">

        <h3>Rating</h3>
        <label for="rating">rating</label>
        <select name="" id="rating">
        <option value="1">Select Your Review</option>
        <option value="2">Bad</option>
        <option value="3">Poor</option>
        <option value="4">Good</option>
        <option value="5">Very Good</option>
        </select>
        <br>
        <br>
        <br>

        <label for="Review">Review</label>
        <textarea name="" id="Review" placeholder="Please Enter Your review in 20 words"></textarea>
    </form>

    <hr>

    <form action="#" >
        <h2>Zomato-style food order</h2>

        <label for="Username">Username</label>
        <input type="text" id="Username" placeholder="Enter Your User name">
        <br>
        <br>
        <label for="Food Item">Food Item</label>
        <select name="Food Item" id="Food Item" >
            <option value="1">Select the Food item</option>
            <option value="2">Biryani</option>
            <option value="3">Manchuriyan</option>
            <option value="4">Pani puri</option>
        </select>

        <label for="Quatity">Quatity</label>
        <input type="number" id="Quatity" min="1" max="10">
        <br>
        <br>

        <label for="Instractions">Delhivery Indtraction</label>
        <textarea name="" id="Instractions" rows="10" cols="40"></textarea>
    </form>

    <hr>
</body>
</html>
